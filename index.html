<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Balaji Business Manager</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  margin:0;
}
.header{
  background:#0d47a1;
  color:#fff;
  padding:20px;
  text-align:center;
}
.container{
  padding:15px;
}
.card{
  background:#fff;
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}
h3{
  margin-top:0;
}
input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:1px solid #ccc;
  border-radius:10px;
}
button{
  background:#0d47a1;
  color:#fff;
  border:none;
  padding:10px 15px;
  border-radius:10px;
  margin-top:10px;
}
.result{
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="header">
<h2>Balaji Business Manager</h2>
<p>Daily Business Dashboard</p>
</div>

<div class="container">

<div class="card">
<h3>Today's Income</h3>
<input type="number" id="income" placeholder="Enter Income">
</div>

<div class="card">
<h3>Today's Expense</h3>
<input type="number" id="expense" placeholder="Enter Expense">
</div>

<div class="card">
<h3>Total Account Balance</h3>
<input type="number" id="account" placeholder="Enter Total Accounts Amount">
</div>

<div class="card">
<h3>Total Cash</h3>
<input type="number" id="cash" placeholder="Enter Cash">
</div>

<div class="card">
<h3>Total UPI Amount</h3>
<input type="number" id="upi" placeholder="Enter UPI Amount">
</div>

<div class="card">
<h3>Total Udhaar</h3>
<input type="number" id="udhaar" placeholder="Enter Udhaar Amount">
</div>

<button onclick="calculate()">Calculate Summary</button>

<div class="card">
<h3>Business Summary</h3>
<div class="result" id="profit">Profit : ₹0</div>
<div class="result" id="worth">Business Worth : ₹0</div>
</div>

</div>

<script>
function calculate(){

let income =
Number(document.getElementById('income').value) || 0;

let expense =
Number(document.getElementById('expense').value) || 0;

let account =
Number(document.getElementById('account').value) || 0;

let cash =
Number(document.getElementById('cash').value) || 0;

let upi =
Number(document.getElementById('upi').value) || 0;

let udhaar =
Number(document.getElementById('udhaar').value) || 0;

let profit = income - expense;
let worth = account + cash + upi + udhaar;

document.getElementById('profit').innerHTML =
"Profit : ₹" + profit;

document.getElementById('worth').innerHTML =
"Business Worth : ₹" + worth;
}
</script>

</body>
</html>
